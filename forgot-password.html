<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — NOIRE</title>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-panel-visual">
    <div class="auth-grid-bg"></div>
    <a href="index.html" class="auth-logo">N O I R E</a>
    <div class="auth-panel-content">
      <p class="auth-panel-quote">
        "A fresh start is just<br/>one <em>click</em> away."
      </p>
    </div>
    <div class="auth-panel-bottom">
      <div class="panel-badge">Secure Reset Process</div>
    </div>
  </div>

  <div class="auth-panel-form">
    <div class="auth-form-wrap">

      <!-- ── STEP 1: Request Reset ──────────────────────────── -->
      <div id="step-request">
        <div class="auth-form-header">
          <span class="auth-eyebrow">— Password Recovery —</span>
          <h1 class="auth-title">Forgot <em>Password?</em></h1>
          <p class="auth-subtitle">Enter your email and we'll send you a reset token.</p>
        </div>

        <div class="alert alert-error"   id="req-error"   role="alert"></div>
        <div class="alert alert-success" id="req-success" role="status"></div>
        <div class="alert alert-info"    id="req-info"    role="status"></div>

        <form class="form" id="forgot-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="req-email">Email Address</label>
            <input class="form-input" type="email" id="req-email"
                   placeholder="your@email.com" autocomplete="email"/>
            <span class="form-error" id="req-email-error"></span>
          </div>
          <button type="submit" class="btn-auth" id="req-btn">
            <span id="req-btn-text">Send Reset Link</span>
            <div class="btn-loader-spin" id="req-loader"></div>
          </button>
        </form>
        <div class="auth-switch" style="margin-top:24px;">
          <a href="login.html">← Back to Sign In</a>
        </div>
      </div>

      <!-- ── STEP 2: Reset Password ─────────────────────────── -->
      <div id="step-reset" style="display:none;">
        <div class="auth-form-header">
          <span class="auth-eyebrow">— New Password —</span>
          <h1 class="auth-title">Reset <em>Password</em></h1>
          <p class="auth-subtitle">Enter your reset token and choose a new password.</p>
        </div>

        <div class="alert alert-error"   id="res-error"   role="alert"></div>
        <div class="alert alert-success" id="res-success" role="status"></div>

        <form class="form" id="reset-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="res-token">Reset Token</label>
            <input class="form-input" type="text" id="res-token"
                   placeholder="Paste your reset token here"/>
            <span class="form-error" id="token-error"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="res-password">New Password</label>
            <div class="input-wrap">
              <input class="form-input" type="password" id="res-password"
                     placeholder="Min. 8 characters"/>
            </div>
            <span class="form-error" id="res-pass-error"></span>
          </div>
          <button type="submit" class="btn-auth" id="res-btn">
            <span id="res-btn-text">Reset Password</span>
            <div class="btn-loader-spin" id="res-loader"></div>
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
const API = 'https://noire-backend-i2bq.onrender.com/';

/* ── Forgot password form ────────────────────────────────────── */
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('req-email').value.trim();
  const errEl = document.getElementById('req-email-error');

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address';
    return;
  }
  errEl.textContent = '';

  const btn    = document.getElementById('req-btn');
  const loader = document.getElementById('req-loader');
  btn.disabled = true;
  document.getElementById('req-btn-text').textContent = 'Sending...';
  loader.classList.add('show');

  try {
    const res  = await fetch(`${API}/auth/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();

    const success = document.getElementById('req-success');
    success.textContent = data.message;
    success.classList.add('show');

    // In dev mode, show the token and auto-fill step 2
    if (data.debug_token) {
      const info = document.getElementById('req-info');
      info.textContent = `[DEV MODE] Reset token: ${data.debug_token}`;
      info.classList.add('show');
      // Show step 2 and pre-fill token
      setTimeout(() => {
        document.getElementById('step-request').style.display = 'none';
        document.getElementById('step-reset').style.display = 'block';
        document.getElementById('res-token').value = data.debug_token;
      }, 2000);
    }
  } catch {
    document.getElementById('req-error').textContent = 'Network error.';
    document.getElementById('req-error').classList.add('show');
  } finally {
    btn.disabled = false;
    document.getElementById('req-btn-text').textContent = 'Send Reset Link';
    loader.classList.remove('show');
  }
});

/* ── Reset password form ─────────────────────────────────────── */
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const token    = document.getElementById('res-token').value.trim();
  const password = document.getElementById('res-password').value;
  let ok = true;

  if (!token) {
    document.getElementById('token-error').textContent = 'Token is required';
    ok = false;
  }
  if (password.length < 8) {
    document.getElementById('res-pass-error').textContent = 'Min. 8 characters';
    ok = false;
  }
  if (!ok) return;

  const btn    = document.getElementById('res-btn');
  const loader = document.getElementById('res-loader');
  btn.disabled = true;
  document.getElementById('res-btn-text').textContent = 'Resetting...';
  loader.classList.add('show');

  try {
    const res  = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('res-error').textContent = data.error;
      document.getElementById('res-error').classList.add('show');
    } else {
      document.getElementById('res-success').textContent = data.message + ' Redirecting to login...';
      document.getElementById('res-success').classList.add('show');
      setTimeout(() => window.location.href = '/login.html?msg=reset', 2000);
    }
  } catch {
    document.getElementById('res-error').textContent = 'Network error.';
    document.getElementById('res-error').classList.add('show');
  } finally {
    btn.disabled = false;
    document.getElementById('res-btn-text').textContent = 'Reset Password';
    loader.classList.remove('show');
  }
});

// Check URL params for token (from email link)
const params = new URLSearchParams(window.location.search);
if (params.get('token')) {
  document.getElementById('step-request').style.display = 'none';
  document.getElementById('step-reset').style.display = 'block';
  document.getElementById('res-token').value = params.get('token');
}
</script>
</body>
</html>
