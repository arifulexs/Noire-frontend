<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — NOIRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
:root{
  --black:#0a0a0a;--black-2:#111;--black-3:#1a1a1a;
  --gray-dark:#222;--gray-mid:#333;--gray-light:#888;
  --white:#f5f5f0;--white-2:#e0e0d8;
  --gold:#c9a84c;--gold-light:#e8c878;
  --font-serif:'Playfair Display',serif;--font-sans:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{background:var(--black);color:var(--white);font-family:var(--font-sans);font-weight:300;display:flex;flex-direction:column;}
a{text-decoration:none;color:inherit;}
::selection{background:var(--gold);color:#000;}

/* NAV */
.navbar{height:60px;background:rgba(10,10,10,.98);border-bottom:1px solid var(--gray-dark);display:flex;align-items:center;flex-shrink:0;}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:var(--font-serif);font-size:17px;letter-spacing:.4em;color:var(--white);}
.nav-logo:hover{color:var(--gold);}
.nav-links{display:flex;align-items:center;gap:16px;}
.nav-link{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray-light);transition:color .2s;}
.nav-link:hover{color:var(--white);}

/* CHAT LAYOUT */
.chat-wrap{display:flex;flex:1;overflow:hidden;height:calc(100vh - 60px);}

/* CONVERSATIONS SIDEBAR */
.conv-sidebar{width:320px;border-right:1px solid var(--gray-dark);display:flex;flex-direction:column;background:var(--black-2);flex-shrink:0;}
.conv-header{padding:20px 20px 14px;border-bottom:1px solid var(--gray-dark);display:flex;align-items:center;justify-content:space-between;}
.conv-header-title{font-family:var(--font-serif);font-size:17px;font-weight:500;}
.btn-new-conv{width:32px;height:32px;border:1px solid var(--gray-dark);background:none;color:var(--gray-light);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,color .2s;}
.btn-new-conv:hover{border-color:var(--gold);color:var(--gold);}

.conv-list{flex:1;overflow-y:auto;padding:8px 0;}
.conv-list::-webkit-scrollbar{width:4px;}
.conv-list::-webkit-scrollbar-thumb{background:var(--gray-dark);}
.conv-item{padding:14px 20px;cursor:pointer;border-left:2px solid transparent;transition:background .2s,border-color .2s;}
.conv-item:hover{background:rgba(255,255,255,.03);}
.conv-item.active{background:rgba(201,168,76,.06);border-left-color:var(--gold);}
.conv-item-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.conv-subject{font-size:13px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.conv-time{font-size:10px;color:var(--gray-light);}
.conv-preview{font-size:12px;color:var(--gray-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread-badge{background:var(--gold);color:#000;font-size:9px;font-weight:600;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.conv-empty{padding:40px 20px;text-align:center;color:var(--gray-light);font-size:13px;}

/* MAIN CHAT AREA */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{padding:16px 24px;border-bottom:1px solid var(--gray-dark);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.6);flex-shrink:0;}
.chat-header-info{}
.chat-header-title{font-family:var(--font-serif);font-size:17px;font-weight:500;margin-bottom:2px;}
.chat-header-sub{font-size:11px;color:var(--gray-light);letter-spacing:.08em;}

.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:var(--gray-dark);}

/* Message bubbles */
.msg-row{display:flex;gap:10px;align-items:flex-end;}
.msg-row.mine{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);font-size:12px;font-weight:600;}
.msg-avatar.admin-av{background:linear-gradient(135deg,var(--gold),#a07830);color:#000;}
.msg-avatar.user-av{background:var(--gray-mid);color:var(--white);}
.msg-bubble{max-width:68%;padding:12px 16px;line-height:1.6;font-size:14px;}
.msg-row.mine .msg-bubble{background:var(--gold);color:#000;border-radius:16px 16px 0 16px;}
.msg-row:not(.mine) .msg-bubble{background:var(--black-3);color:var(--white-2);border:1px solid var(--gray-dark);border-radius:16px 16px 16px 0;}
.msg-image{max-width:260px;border:1px solid var(--gray-dark);cursor:zoom-in;}
.msg-time{font-size:10px;margin-top:4px;color:var(--gray-light);text-align:right;}
.msg-row:not(.mine) .msg-time{text-align:left;}

.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--gray-light);font-size:14px;padding:40px;}
.chat-no-selection{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--gray-light);}
.chat-no-selection h3{font-family:var(--font-serif);font-size:22px;color:var(--white-2);}

/* INPUT AREA */
.chat-input-area{padding:16px 24px;border-top:1px solid var(--gray-dark);background:var(--black-2);flex-shrink:0;}
.img-preview-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.img-thumb{width:52px;height:52px;object-fit:cover;border:1px solid var(--gray-dark);position:relative;}
.img-thumb-wrap{position:relative;}
.img-thumb-remove{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;font-size:10px;color:#000;display:flex;align-items:center;justify-content:center;line-height:1;}
.input-row{display:flex;gap:10px;align-items:flex-end;}
.chat-input{flex:1;background:var(--black-3);border:1px solid var(--gray-dark);color:var(--white);padding:12px 14px;font-size:14px;font-family:var(--font-sans);resize:none;outline:none;transition:border-color .2s;max-height:120px;min-height:44px;}
.chat-input:focus{border-color:var(--gold);}
.input-actions{display:flex;gap:6px;}
.action-btn{width:42px;height:42px;border:1px solid var(--gray-dark);background:none;color:var(--gray-light);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,color .2s;}
.action-btn:hover{border-color:var(--gold);color:var(--gold);}
.send-btn{width:42px;height:42px;background:var(--gold);border:none;color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;}
.send-btn:hover{background:var(--gold-light);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}
#img-file-input{display:none;}

/* NEW CONV MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--black-2);border:1px solid var(--gray-dark);width:460px;max-width:95vw;animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-head{padding:22px 24px;border-bottom:1px solid var(--gray-dark);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-serif);font-size:17px;font-weight:500;}
.modal-close-btn{background:none;border:none;color:var(--gray-light);cursor:pointer;padding:4px;}
.modal-close-btn:hover{color:var(--white);}
.modal-body{padding:24px;display:flex;flex-direction:column;gap:16px;}
.m-field{display:flex;flex-direction:column;gap:7px;}
.m-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gray-light);}
.m-input{background:var(--black-3);border:1px solid var(--gray-dark);color:var(--white);padding:12px 14px;font-size:14px;font-family:var(--font-sans);outline:none;transition:border-color .2s;}
.m-input:focus{border-color:var(--gold);}
.m-textarea{resize:vertical;min-height:90px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--gray-dark);display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:10px 18px;background:none;border:1px solid var(--gray-mid);color:var(--white-2);font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;}
.btn-start{padding:10px 22px;background:var(--gold);border:none;color:#000;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:var(--font-sans);}

/* Image lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border:1px solid var(--gray-dark);}

@media(max-width:700px){
  .conv-sidebar{width:100%;position:absolute;z-index:50;height:100%;transform:translateX(-100%);transition:transform .3s;}
  .conv-sidebar.mobile-open{transform:translateX(0);}
  .chat-wrap{position:relative;}
}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">N O I R E</a>
    <div class="nav-links">
      <a href="/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/custom-order.html" class="nav-link">Custom Order</a>
    </div>
  </div>
</nav>

<div class="chat-wrap">
  <!-- CONVERSATIONS LIST -->
  <div class="conv-sidebar" id="conv-sidebar">
    <div class="conv-header">
      <span class="conv-header-title">Messages</span>
      <button class="btn-new-conv" id="btn-new-conv" title="New conversation">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="conv-empty">Loading conversations...</div>
    </div>
  </div>

  <!-- CHAT MAIN -->
  <div class="chat-main" id="chat-main">
    <div class="chat-no-selection" id="no-selection">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <h3>Select a conversation</h3>
      <p>Or start a new one with our team</p>
    </div>

    <!-- Active chat (hidden until conv selected) -->
    <div id="active-chat" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none;">
      <div class="chat-header">
        <div class="chat-header-info">
          <div class="chat-header-title" id="chat-title">—</div>
          <div class="chat-header-sub" id="chat-sub">—</div>
        </div>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="img-preview-bar" id="img-preview-bar"></div>
        <div class="input-row">
          <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1"></textarea>
          <div class="input-actions">
            <label class="action-btn" for="img-file-input" title="Attach image">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <input type="file" id="img-file-input" accept="image/*"/>
            </label>
            <button class="send-btn" id="send-btn" title="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW CONVERSATION MODAL -->
<div class="modal-overlay" id="new-conv-modal">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">New Message</span>
      <button class="modal-close-btn" id="close-modal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="m-field">
        <label class="m-label">Subject</label>
        <input type="text" class="m-input" id="new-subject" placeholder="e.g. Question about sizing"/>
      </div>
      <div class="m-field">
        <label class="m-label">Message</label>
        <textarea class="m-input m-textarea" id="new-message" placeholder="How can we help you?"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="cancel-modal">Cancel</button>
      <button class="btn-start" id="start-conv-btn">Send Message</button>
    </div>
  </div>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
const API   = 'https://noire-backend-i2bq.onrender.com/';
const token = localStorage.getItem('noire_token');
const user  = JSON.parse(localStorage.getItem('noire_user') || 'null');

if (!token || !user) { window.location.href = '/login.html'; }

let activeConvId  = null;
let pollInterval  = null;
let pendingImage  = null;

/* ── Auth fetch ─────────────────────────────────────────────── */
async function af(url, opts = {}) {
  const r = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
  });
  if (r.status === 401) { localStorage.clear(); window.location.href = '/login.html'; }
  return r.json();
}

/* ── Format time ────────────────────────────────────────────── */
function fmtTime(d) {
  const dt  = new Date(d);
  const now = new Date();
  const diff = now - dt;
  if (diff < 60000)  return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  if (dt.toDateString() === now.toDateString()) return dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return dt.toLocaleDateString('en-GB', {day:'2-digit',month:'short'});
}

/* ── Load conversations ─────────────────────────────────────── */
async function loadConversations() {
  const data = await af(`${API}/messages/conversations`);
  const list = data.conversations || [];
  const el   = document.getElementById('conv-list');

  if (list.length === 0) {
    el.innerHTML = `<div class="conv-empty">No conversations yet.<br/>Tap + to start one.</div>`;
    return;
  }

  el.innerHTML = list.map(c => `
    <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConv(${c.id},'${c.subject.replace(/'/g,"\\'")}')">
      <div class="conv-item-head">
        <span class="conv-subject">${c.subject}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          ${c.unread_count > 0 ? `<span class="unread-badge">${c.unread_count}</span>` : ''}
          <span class="conv-time">${fmtTime(c.last_message_at)}</span>
        </div>
      </div>
      <div class="conv-preview">${c.custom_order_id ? '📦 Custom Order' : '💬 General'}</div>
    </div>
  `).join('');
}

/* ── Open conversation ──────────────────────────────────────── */
async function openConv(convId, subject) {
  activeConvId = convId;
  document.getElementById('no-selection').style.display  = 'none';
  document.getElementById('active-chat').style.display   = 'flex';
  document.getElementById('active-chat').style.flexDirection = 'column';
  document.getElementById('chat-title').textContent = subject;

  // Reload to update active state
  loadConversations();
  await loadMessages(convId);

  // Mark as read
  await fetch(`${API}/messages/conversations/${convId}/read`, {
    method: 'PUT', headers: { Authorization: `Bearer ${token}` }
  });

  // Start polling
  clearInterval(pollInterval);
  pollInterval = setInterval(() => loadMessages(convId, true), 5000);
}

/* ── Load messages ──────────────────────────────────────────── */
async function loadMessages(convId, polling = false) {
  const data = await af(`${API}/messages/conversations/${convId}`);
  const msgs = data.messages || [];
  const conv = data.conversation;

  if (conv) {
    document.getElementById('chat-sub').textContent =
      conv.custom_order_id ? `Custom Order #${conv.custom_order_id}` : 'General Inquiry';
  }

  const el    = document.getElementById('chat-messages');
  const isBot = el.scrollHeight - el.scrollTop - el.clientHeight < 80;

  if (msgs.length === 0) {
    el.innerHTML = `<div class="chat-empty">No messages yet. Send the first message!</div>`;
    return;
  }

  el.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === user.id;
    const initials = (m.sender_name || 'A')[0].toUpperCase();
    const avatarClass = m.sender_role === 'admin' ? 'admin-av' : 'user-av';
    const bubbleContent = m.image_path
      ? `<img class="msg-image" src="/uploads/${m.image_path}" alt="Image" onclick="openLightbox('/uploads/${m.image_path}')" loading="lazy"/>`
      : (m.content || '');

    return `
      <div class="msg-row ${isMine ? 'mine' : ''}">
        <div class="msg-avatar ${avatarClass}">${initials}</div>
        <div>
          <div class="msg-bubble">${bubbleContent}</div>
          <div class="msg-time">${fmtTime(m.created_at)}</div>
        </div>
      </div>`;
  }).join('');

  // Scroll to bottom on new messages or initial load
  if (!polling || isBot) {
    el.scrollTop = el.scrollHeight;
  }
}

/* ── Send message ───────────────────────────────────────────── */
async function sendMessage() {
  if (!activeConvId) return;
  const content = document.getElementById('chat-input').value.trim();
  const sendBtn = document.getElementById('send-btn');

  if (!content && !pendingImage) return;

  sendBtn.disabled = true;

  try {
    const fd = new FormData();
    if (content)      fd.append('content', content);
    if (pendingImage) fd.append('image', pendingImage);

    const res = await fetch(`${API}/messages/conversations/${activeConvId}`, {
      method:  'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: fd,
    });

    if (res.ok) {
      document.getElementById('chat-input').value = '';
      clearPendingImage();
      loadMessages(activeConvId);
      loadConversations();
    }
  } finally {
    sendBtn.disabled = false;
  }
}

/* ── Image attachment ───────────────────────────────────────── */
document.getElementById('img-file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  pendingImage = file;
  const url = URL.createObjectURL(file);
  document.getElementById('img-preview-bar').innerHTML = `
    <div class="img-thumb-wrap">
      <img class="img-thumb" src="${url}" alt=""/>
      <button class="img-thumb-remove" onclick="clearPendingImage()" type="button">✕</button>
    </div>`;
});

function clearPendingImage() {
  pendingImage = null;
  document.getElementById('img-preview-bar').innerHTML = '';
  document.getElementById('img-file-input').value = '';
}

/* ── Send button + Enter ────────────────────────────────────── */
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

/* ── Auto-resize textarea ───────────────────────────────────── */
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

/* ── New conversation modal ─────────────────────────────────── */
document.getElementById('btn-new-conv').addEventListener('click', () => {
  document.getElementById('new-conv-modal').classList.add('open');
  document.getElementById('new-subject').focus();
});
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('cancel-modal').addEventListener('click', closeModal);
function closeModal() {
  document.getElementById('new-conv-modal').classList.remove('open');
  document.getElementById('new-subject').value = '';
  document.getElementById('new-message').value = '';
}

document.getElementById('start-conv-btn').addEventListener('click', async () => {
  const subject = document.getElementById('new-subject').value.trim();
  const message = document.getElementById('new-message').value.trim();
  if (!subject || subject.length < 3) { alert('Please enter a subject.'); return; }
  if (!message) { alert('Please enter a message.'); return; }

  const btn = document.getElementById('start-conv-btn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const data = await af(`${API}/messages/conversations`, {
      method: 'POST',
      body: JSON.stringify({ subject, message }),
    });
    closeModal();
    loadConversations();
    if (data.conversation) openConv(data.conversation.id, data.conversation.subject);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
});

/* ── Lightbox ───────────────────────────────────────────────── */
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ── Init ───────────────────────────────────────────────────── */
loadConversations();

// Open specific conversation from URL param
const params = new URLSearchParams(window.location.search);
if (params.get('conv')) {
  const convId = parseInt(params.get('conv'));
  if (convId) {
    setTimeout(() => {
      const item = document.querySelector(`.conv-item[onclick*="openConv(${convId}"]`);
      if (item) item.click();
    }, 800);
  }
}

// Refresh conversations every 15 seconds
setInterval(loadConversations, 15000);
</script>
</body>
</html>
